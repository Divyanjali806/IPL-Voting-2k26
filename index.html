<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>IPL Teams</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background: #0a0e2e;
            color: white;
            font-family: Arial;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .team-card {
            background: #222;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }

        img {
            width: 80px;
        }

        .card-counter {
            position: absolute;
            bottom: 5px;
            right: 10px;
        }

        .plus-one {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            animation: pop 1s forwards;
        }

        @keyframes pop {
            0% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -100%); }
        }
    </style>
</head>

<body>

<h2>🏏 IPL Vote 2026</h2>

<div class="grid" id="teamGrid"></div>

<h3>Total Votes</h3>
<div id="totalList"></div>
<p>Grand Total: <span id="grandTotal">0</span></p>

<script>
const supabase = window.supabase.createClient(
    "https://xitqwhrmigcouvlergkl.supabase.co",
    "sb_publishable_3BG16KghBRbV1Y16MG2t1g_4sUKbimV"
);

const TABLE = "Votes";

const teams = [
    { id: 'csk', name: 'CSK', logo: 'https://documents.iplt20.com/ipl/CSK/logos/Logooutline/CSKoutline.png' },
    { id: 'rcb', name: 'RCB', logo: 'https://documents.iplt20.com/ipl/RCB/Logos/Logooutline/RCBoutline.png' },
    { id: 'mi', name: 'MI', logo: 'https://documents.iplt20.com/ipl/MI/Logos/Logooutline/MIoutline.png' },
    { id: 'dc', name: 'DC', logo: 'https://documents.iplt20.com/ipl/DC/Logos/LogoOutline/DCoutline.png' },
    { id: 'gt', name: 'GT', logo: 'https://documents.iplt20.com/ipl/GT/Logos/Logooutline/GToutline.png' },
    { id: 'kkr', name: 'KKR', logo: 'https://documents.iplt20.com/ipl/KKR/Logos/Logooutline/KKRoutline.png' },
    { id: 'lsg', name: 'LSG', logo: 'https://documents.iplt20.com/ipl/LSG/Logos/Logooutline/LSGoutline.png' },
    { id: 'pbks', name: 'PBKS', logo: 'https://documents.iplt20.com/ipl/PBKS/Logos/Logooutline/PBKSoutline.png' },
    { id: 'rr', name: 'RR', logo: 'https://documents.iplt20.com/ipl/RR/Logos/Logooutline/RRoutline.png' },
    { id: 'srh', name: 'SRH', logo: 'https://documents.iplt20.com/ipl/SRH/Logos/Logooutline/SRHoutline.png' }
];

const votes = {};
teams.forEach(t => votes[t.id] = 0);

const grid = document.getElementById('teamGrid');
const totalList = document.getElementById('totalList');

// UI build
teams.forEach(team => {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = `
        <img src="${team.logo}">
        <div>${team.name}</div>
        <span class="card-counter" id="vc-${team.id}">0</span>
    `;
    card.onclick = () => voteForTeam(team.id);
    grid.appendChild(card);

    const row = document.createElement('div');
    row.innerHTML = `${team.name}: <span id="tc-${team.id}">0</span>`;
    totalList.appendChild(row);
});

// load data
async function loadVotes() {
    const { data, error } = await supabase.from(TABLE).select('*');

    if (error) return console.error(error);

    data.forEach(row => {
        votes[row.team] = Number(row.count);
    });

    updateUI();
}

// update UI
function updateUI() {
    teams.forEach(team => {
        document.getElementById('vc-' + team.id).textContent = votes[team.id];
        document.getElementById('tc-' + team.id).textContent = votes[team.id];
    });

    const total = Object.values(votes).reduce((a,b)=>a+b,0);
    document.getElementById('grandTotal').textContent = total;
}

// vote
async function voteForTeam(teamId) {

    votes[teamId]++;
    updateUI();

    await supabase
        .from(TABLE)
        .update({ count: votes[teamId] })
        .eq('team', teamId);

    const card = event.currentTarget;
    const plus = document.createElement('div');
    plus.innerText = "+1";
    plus.className = "plus-one";
    card.appendChild(plus);

    setTimeout(()=>plus.remove(),1000);
}

loadVotes();
</script>

</body>
</html>
