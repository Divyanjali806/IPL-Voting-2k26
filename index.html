<!DOCTYPE html>  <html lang="en">  <head>  
    <meta charset="UTF-8" />  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />  
    <title>IPL Teams</title>  
    <style>  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
        }  body {  
        background-color: #0a0e2e;  
        font-family: 'Arial Black', Arial, sans-serif;  
        min-height: 100vh;  
        padding: 16px;  
    }  

    .title-section {  
        display: flex;  
        align-items: center;  
        justify-content: space-between;  
        margin-bottom: 20px;  
        padding: 10px 16px;  
        color: white;  
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;  
        border-radius: 12px;  
        background: rgba(255, 255, 255, 0.07);  
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);  
        min-height: calc(2.5rem + 1.2rem + 16px);  
    }  

    .title-left {  
        display: flex;  
        flex-direction: column;  
        align-items: flex-start;  
        gap: 6px;  
    }  

    .title-section h1 {  
        font-size: 2.5rem;  
        font-weight: 900;  
        margin: 0;  
        text-shadow: 3px 1px 1px rgb(221, 176, 176);  
    }  

    .title-section p {  
        font-size: 1.2rem;  
        margin: 0;  
        opacity: 0.9;  
    }  

    .title-icon img {  
        height: 100%;  
        max-height: calc(2.5rem + 1.2rem + 12px);  
        width: auto;  
        object-fit: contain;  
        border-radius: 10px;  
        border: 2px solid rgba(255, 255, 255, 0.7);  
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);  
        transition: transform 0.2s ease, box-shadow 0.2s ease;  
    }  

    .title-icon:hover img {  
        transform: scale(1.1);  
        box-shadow: 0 0 14px rgba(255, 255, 255, 1);  
    }  

    .grid {  
        display: grid;  
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));  
        gap: 14px;  
        max-width: 1100px;  
        margin: 0 auto;  
        width: 100%;  
    }  

    .team-card {  
        border-radius: 18px;  
        overflow: hidden;  
        position: relative;  
        cursor: pointer;  
        aspect-ratio: 0.85;  
        display: flex;  
        flex-direction: column;  
        box-shadow: 1px 2px 10px rgba(226, 180, 180, 0.4);  
        transition: transform 0.15s ease;  
        -webkit-tap-highlight-color: transparent;  
    }  

    .team-card:active {  
        transform: scale(0.97);  
    }  

    /* Top logo section */  
    .card-top {  
        flex: 1.1;  
        display: flex;  
        align-items: center;  
        justify-content: center;  
        position: relative;  
        overflow: hidden;  
    }  

    .card-top img {  
        width: 55%;  
        max-width: 130px;  
        object-fit: contain;  
        filter: drop-shadow(0 3px 1px rgba(134, 0, 0, 0.5));  
        position: relative;  
        z-index: 2;  
    }  

    /* Bottom name section */  
    .card-bottom {  
        padding: 10px 14px 10px 14px;  
        display: flex;  
        align-items: center;  
        justify-content: space-between;  
        position: relative;  
    }  

    .team-name {  
        font-size: clamp(11px, 2.2vw, 15px);  
        font-weight: 900;  
        color: #fff;  
        letter-spacing: 0.3px;  
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);  
        line-height: 1.2;  
    }  

    .card-counter {  
        position: absolute;  
        bottom: 10px;  
        right: 14px;  
        font-size: 12px;  
        color: rgba(255, 255, 255, 0.9);  
        font-weight: 700;  
        background: rgba(0, 0, 0, 0.3);  
        padding: 2px 6px;  
        border-radius: 10px;  
        min-width: 20px;  
        text-align: center;  
    }  

    /* ===== Team-specific colors ===== */  

    /* CSK - Yellow top, Blue bottom */  
    .csk .card-top {  
        background-color: #f5d000;  
    }  

    .csk .card-bottom {  
        background-color: #1a4fa0;  
        height: 50px;  
    }  

    /* DC - Dark blue top, Red bottom */  
    .dc .card-top {  
        background-color: #1a237e;  
    }  

    .dc .card-bottom {  
        background-color: #c0392b;  
        height: 50px;  
    }  

    /* GT - Dark navy top, Gold bottom */  
    .gt .card-top {  
        background-color: #0d1b3e;  
    }  

    .gt .card-bottom {  
        background-color: #b8983a;  
        height: 50px;  
    }  

    /* KKR - Purple top, Gold bottom */  
    .kkr .card-top {  
        background-color: #3a1c6e;  
    }  

    .kkr .card-bottom {  
        background-color: #c9a227;  
        height: 50px;  
    }  

    /* LSG - Dark red top, Beige bottom */  
    .lsg .card-top {  
        background-color: #8b1a2e;  
    }  

    .lsg .card-bottom {  
        background-color: #c9a98a;  
        height: 50px;  
    }  

    /* MI - Dark blue top, Gold bottom */  
    .mi .card-top {  
        background-color: #00408a;  
    }  

    .mi .card-bottom {  
        background-color: #c9a227;  
        height: 50px;  
    }  

    /* PBKS - Red top, Gold bottom */  
    .pbks .card-top {  
        background-color: #c0392b;  
    }  

    .pbks .card-bottom {  
        background-color: #c9a227;  
        height: 50px;  
    }  

    /* RR - Hot pink top, Purple bottom */  
    .rr .card-top {  
        background-color: #e91e8c;  
    }  

    .rr .card-bottom {  
        background-color: #2d1b6e;  
        height: 50px;  
    }  

    /* RCB - Red top, Dark red bottom */  
    .rcb .card-top {  
        background-color: #cc0000;  
    }  

    .rcb .card-bottom {  
        background-color: #8b0000;  
        height: 50px;  
    }  

    /* SRH - Orange top, Dark bottom */  
    .srh .card-top {  
        background-color: #f47216;  
    }  

    .srh .card-bottom {  
        background-color: #e06010;  
        height: 50px;  
    }  

    /* Total votes section */  
    .total-section {  
        max-width: 800px;  
        margin: 22px auto 0 auto;  
        background: rgba(255, 255, 255, 0.06);  
        border: 1.5px solid rgba(255, 255, 255, 0.12);  
        border-radius: 16px;  
        padding: 18px 20px;  
    }  

    .total-title {  
        color: #fff;  
        font-size: clamp(13px, 3vw, 17px);  
        font-weight: 900;  
        letter-spacing: 1px;  
        text-transform: uppercase;  
        margin-bottom: 14px;  
        text-align: center;  
        opacity: 0.9;  
    }  

    .total-list {  
        display: flex;  
        flex-direction: column;  
        gap: 8px;  
    }  

    .total-row {  
        display: flex;  
        align-items: center;  
        gap: 10px;  
    }  

    .total-row-name {  
        color: white;  
        font-size: clamp(10px, 2.2vw, 13px);  
        font-weight: 700;  
        width: 48%;  
        flex-shrink: 0;  
    }  

    .total-bar-wrap {  
        flex: 1;  
        background: rgb(88, 86, 86);  
        border-radius: 99px;  
        height: 8px;  
        overflow: hidden;  
    }  

    .total-bar {  
        height: 100%;  
        border-radius: 99px;  
        background: white;  
        width: 0%;  
        transition: width 0.4s ease;  
    }  

    .total-row-count {  
        color: #fff;  
        font-size: clamp(10px, 2.2vw, 13px);  
        font-weight: 900;  
        width: 28px;  
        text-align: right;  
        flex-shrink: 0;  
    }  

    .grand-total {  
        margin-top: 14px;  
        text-align: center;  
        color: rgba(255, 255, 255, 0.6);  
        font-size: clamp(11px, 2.5vw, 14px);  
        font-weight: 700;  
    }  

    .grand-total span {  
        color: #fff;  
        font-size: clamp(13px, 3vw, 18px);  
    }  

    /* +1 popup */  
    .plus-one {  
        position: absolute;  
        top: 50%;  
        left: 50%;  
        transform: translate(-50%, -50%);  
        color: #faf8f8;  
        font-size: 150px;  
        font-weight: 900;  
        text-shadow: 0 0 5px #070707;  
        pointer-events: none;  
        animation: plusOneAnim 1s ease-out forwards;  
    }  

    @keyframes plusOneAnim {  
        0% {  
            opacity: 1;  
            transform: translate(-50%, -50%) scale(1);  
        }  

        100% {  
            opacity: 0;  
            transform: translate(-50%, -100%) scale(1.5);  
        }  
    }  

    /* Responsive tweaks */  
    @media (max-width: 360px) {  
        .team-name {  
            font-size: 10px;  
        }  

        .grid {  
            gap: 10px;  
        }  
    }  

    @media (min-width: 600px) {  
        .team-name {  
            font-size: 15px;  
        }  

        .card-top img {  
            width: 50%;  
        }  
    }  

    @media (min-width: 800px) {  
        body {  
            padding: 24px;  
        }  

        .grid {  
            gap: 18px;  
        }  
    }  

    /* extra responsive scaling */  
    @media (max-width: 760px) {  
        .title-section {  
            padding: 12px;  
        }  

        .title-section h1 {  
            font-size: 2rem;  
        }  

        .title-section p {  
            font-size: 1rem;  
        }  

        .title-icon img {  
            max-height: 72px;  
        }  

        .card-top img {  
            width: 60%;  
            max-width: 120px;  
        }  

        .card-bottom {  
            padding: 8px 10px;  
        }  
    }  

    @media (max-width: 420px) {  
        body {  
            padding: 12px;  
        }  

        .title-section h1 {  
            font-size: 1.6rem;  
        }  

        .title-section p {  
            font-size: 0.95rem;  
        }  

        .title-icon img {  
            max-height: 52px;  
        }  

        .team-card {  
            border-radius: 14px;  
        }  

        .card-top img {  
            width: 65%;  
            max-width: 100px;  
        }  
    }  
</style>

</head>  <body>  <div class="title-section">  
    <div class="title-left">  
        <h1>🏏IPL Vote 2026</h1>  
        <p>Tap your favorite team</p>  
    </div>  
    <a href="https://www.instagram.com/challengersofberhampur?igsh=M2JyNjR4eGV2aXhj" target="_blank"  
        class="title-icon">  
        <img src="yuuuu.PNG" alt="Header Icon" />  
    </a>  
</div>  

<div class="grid" id="teamGrid"></div>  

<div class="total-section" id="totalSection">  
    <div class="total-title">🏏 Total Votes</div>  
    <div class="total-list" id="totalList"></div>  
    <div class="grand-total">Grand Total: <span id="grandTotal">0</span> votes</div>  
</div>  

<script>  
    const teams = [  
        {  
            id: 'csk',  
            name: 'Chennai Super Kings',  
            logo: 'https://documents.iplt20.com/ipl/CSK/logos/Logooutline/CSKoutline.png',  
        },  
        {  
            id: 'rcb',  
            name: 'Royal Challengers Bengaluru',  
            logo: 'https://documents.iplt20.com/ipl/RCB/Logos/Logooutline/RCBoutline.png',  
        },  
        {  
            id: 'mi',  
            name: 'Mumbai Indians',  
            logo: 'https://documents.iplt20.com/ipl/MI/Logos/Logooutline/MIoutline.png',  
        },  
        {  
            id: 'dc',  
            name: 'Delhi Capitals',  
            logo: 'https://documents.iplt20.com/ipl/DC/Logos/LogoOutline/DCoutline.png',  
        },  
        {  
            id: 'gt',  
            name: 'Gujarat Titans',  
            logo: 'https://documents.iplt20.com/ipl/GT/Logos/Logooutline/GToutline.png',  
        },  
        {  
            id: 'kkr',  
            name: 'Kolkata Knight Riders',  
            logo: 'https://documents.iplt20.com/ipl/KKR/Logos/Logooutline/KKRoutline.png',  
        },  
        {  
            id: 'lsg',  
            name: 'Lucknow Super Giants',  
            logo: 'https://documents.iplt20.com/ipl/LSG/Logos/Logooutline/LSGoutline.png',  
        },  
        {  
            id: 'pbks',  
            name: 'Punjab Kings',  
            logo: 'https://documents.iplt20.com/ipl/PBKS/Logos/Logooutline/PBKSoutline.png',  
        },  
        {  
            id: 'rr',  
            name: 'Rajasthan Royals',  
            logo: 'https://documents.iplt20.com/ipl/RR/Logos/Logooutline/RRoutline.png',  
        },  
        {  
            id: 'srh',  
            name: 'Sunrisers Hyderabad',  
            logo: 'https://documents.iplt20.com/ipl/SRH/Logos/Logooutline/SRHoutline.png',  
        },  
    ];  

    const votes = {};  
    teams.forEach(t => votes[t.id] = 0);  

    const grid = document.getElementById('teamGrid');  
    const totalList = document.getElementById('totalList');  

    // Build cards  
    teams.forEach(team => {  
        const card = document.createElement('div');  
        card.className = `team-card ${team.id}`;  
        card.innerHTML = `  
  <div class="card-top">  
    <img src="${team.logo}" alt="${team.name}" loading="lazy" onerror="this.style.opacity='0.3'"/>  
  </div>  
  <div class="card-bottom">  
    <div class="team-name">${team.name}</div>  
    <span class="card-counter" id="vc-${team.id}">0</span>  
  </div>  
`;  
        card.onclick = () => voteForTeam(team.id);  
        grid.appendChild(card);  
    });  

    // Build total rows  
    teams.forEach(team => {  
        const row = document.createElement('div');  
        row.className = 'total-row';  
        row.innerHTML = `  
  <div class="total-row-name">${team.name}</div>  
  <div class="total-bar-wrap"><div class="total-bar" id="bar-${team.id}"></div></div>  
  <div class="total-row-count" id="tc-${team.id}">0</div>  
`;  
        totalList.appendChild(row);  
    });  

    function voteForTeam(teamId) {  
        votes[teamId]++;  

        // Update card counter  
        document.getElementById('vc-' + teamId).textContent = votes[teamId];  

        // Update total section  
        document.getElementById('tc-' + teamId).textContent = votes[teamId];  

        // Update bars  
        const maxVotes = Math.max(...Object.values(votes), 1);  
        teams.forEach(t => {  
            const bar = document.getElementById('bar-' + t.id);  
            bar.style.width = ((votes[t.id] / maxVotes) * 100) + '%';  
        });  

        // Grand total  
        const grand = Object.values(votes).reduce((a, b) => a + b, 0);  
        document.getElementById('grandTotal').textContent = grand;  

        // Show +1 popup  
        const card = document.querySelector(`.team-card.${teamId}`);  
        const plusOne = document.createElement('span');  
        plusOne.textContent = '+1';  
        plusOne.className = 'plus-one';  
        card.appendChild(plusOne);  
        setTimeout(() => {  
            if (card.contains(plusOne)) {  
                card.removeChild(plusOne);  
            }  
        }, 1000);  
    }  
</script>
